<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

#player{
width:100%;
height:100vh;
}

#watermark{

position:fixed;
top:12px;
left:50%;

transform:translateX(-50%);

font-family:'Orbitron', sans-serif;

font-size:16px;

color:rgba(255,255,255,0.35);

letter-spacing:3px;

pointer-events:none;

}

</style>

</head>

<body>

<div id="watermark">EJALTV</div>

<div id="player"></div>

<script>

var player = jwplayer("player").setup({

file: "https://unifi-live2.secureswiftcontent.com/Content/DASH/Live/channel(HBO)/master.mpd",

width: "100%",
height: "100%",

autostart: true,

stretching: "fill",

drm: {
  clearkey: {
    keyId: "7ad888ee5dd6496a8c2c77a6284ff936",
    key: "718716c435914901d2551930a256974e"
  }
}

});

document.getElementById("player").onclick = function(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}

};

</script>

</body>

</html>
