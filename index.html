<!DOCTYPE html>
<html>
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>

body{
margin:0;
background:black;
}

#video{
width:100%;
height:100vh;
}

#watermark{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
color:rgba(255,255,255,0.4);
font-size:14px;
font-family:Arial;
pointer-events:none;
}

</style>

<body>

<div id="watermark">EJALTV</div>

<video id="video" controls></video>

<script>

const video = document.getElementById("video");

video.onclick = () => {
video.requestFullscreen();
};

async function init(){

const player = new shaka.Player(video);

player.configure({
drm:{
clearKeys:{
"7ad888ee5dd6496a8c2c77a6284ff936":"718716c435914901d2551930a256974e"
}
}
});

await player.load("https://unifi-live2.secureswiftcontent.com/Content/DASH/Live/channel(HBO)/master.mpd");

}

init();

</script>

</body>
</html>
