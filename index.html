<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EJALTV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
</head>

<body>

<video id="video"
       width="900"
       controls
       autoplay>
</video>

<script>
async function initPlayer() {

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  player.configure({
    drm: {
      clearKeys: {
        "7ad888ee5dd6496a8c2c77a6284ff936": "718716c435914901d2551930a256974e"
      }
    }
  });

  try {
    await player.load("https://unifi-live2.secureswiftcontent.com/Content/DASH/Live/channel(HBO)/master.mpd");
    console.log("Video loaded!");
  } catch (e) {
    console.error("Error loading video", e);
  }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
